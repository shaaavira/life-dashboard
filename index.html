<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- WAJIB BIAR RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Egg Dashboard 🍳</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- version biar ke-refresh -->
    <link rel="stylesheet" href="css/style.css?v=99">
</head>
<body>

<div class="container">

<button id="themeToggle">🌙</button>

<h1 class="main-title">Hello, Egg-cellent friend 🫶🏻🐣</h1>

<!-- CLOCK -->
<div class="card">
    <h2>⏰ Clock and Date</h2>
    <h1 id="time">00:00</h1>
    <p id="date"></p>

    <h2 id="greeting">
        Good Evening, <span id="nameDisplay">Guest</span>
    </h2>

    <div class="input-group">
        <input type="text" id="nameInput" placeholder="Your name..." />
        <button onclick="saveName()">Save</button>
    </div>
</div>

<div class="row">

    <!-- TIMER -->
    <div class="card timer-card">
        <h2>🍳 Focus Timer</h2>
        <h1 id="timer">25:00</h1>

        <div class="input-group">
            <input type="number" id="customMinutes" placeholder="Minutes" min="1">
            <button onclick="setCustomTimer()">Set</button>
        </div>

        <div class="timer-buttons">
            <button onclick="startTimer()">▶ Start</button>
            <button onclick="stopTimer()">⏸ Stop</button>
            <button onclick="resetTimer()">🔄 Reset</button>
        </div>
    </div>

    <!-- TASK -->
    <div class="card">
        <h2>🌻 Tasks</h2>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add something cute ✨💛">
            <button onclick="addTask()">➕ Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>

</div>

<!-- LINKS -->
<div class="card">
    <h2>🐥 Quick Links</h2>

    <!-- 🔥 SUDAH DIPERBAIKI -->
    <div class="input-group">
        <input type="text" id="linkName" placeholder="Name">
        <input type="text" id="linkURL" placeholder="URL">
        <button onclick="addLink()">✨ Add Link</button>
    </div>

    <div id="links"></div>
</div>

</div>

<script src="js/script.js"></script>
</body>
</html>
